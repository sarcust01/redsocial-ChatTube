<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatTube - Feed</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="navbar">
        <h1><a href="index.html">ChatTube</a></h1>
        <div>David Lopez</div>
    </header>

    <div class="container">
        
        <main class="main-area">
            <div class="post-container">
                <div class="post-image">
                    <svg width="100" height="150" viewBox="0 0 100 150">
                        <circle cx="50" cy="30" r="15" stroke="black" stroke-width="2" fill="none"/>
                        <line x1="50" y1="45" x2="50" y2="100" stroke="black" stroke-width="2"/>
                        <line x1="20" y1="60" x2="80" y2="60" stroke="black" stroke-width="2"/>
                        <line x1="50" y1="100" x2="25" y2="140" stroke="black" stroke-width="2"/>
                        <line x1="50" y1="100" x2="75" y2="140" stroke="black" stroke-width="2"/>
                    </svg>
                </div>
                
                <p class="post-text">Texto de publicación<br>Lorem ipsum dolor sit amet</p>

                <div class="comment">
                    <div class="comment-icon">
                        <svg width="20" height="20" viewBox="0 0 100 150"><circle cx="50" cy="30" r="15" stroke="black" stroke-width="4" fill="none"/><line x1="50" y1="45" x2="50" y2="100" stroke="black" stroke-width="4"/><line x1="20" y1="60" x2="80" y2="60" stroke="black" stroke-width="4"/><line x1="50" y1="100" x2="25" y2="140" stroke="black" stroke-width="4"/><line x1="50" y1="100" x2="75" y2="140" stroke="black" stroke-width="4"/></svg>
                    </div>
                    <span class="comment-text">Comentario</span>
                </div>
                
                <div class="comment">
                    <div class="comment-icon">
                        <svg width="20" height="20" viewBox="0 0 100 150"><circle cx="50" cy="30" r="15" stroke="black" stroke-width="4" fill="none"/><line x1="50" y1="45" x2="50" y2="100" stroke="black" stroke-width="4"/><line x1="20" y1="60" x2="80" y2="60" stroke="black" stroke-width="4"/><line x1="50" y1="100" x2="25" y2="140" stroke="black" stroke-width="4"/><line x1="50" y1="100" x2="75" y2="140" stroke="black" stroke-width="4"/></svg>
                    </div>
                    <span class="comment-text">Comentario</span>
                </div>
            </div>
        </main>

        <aside class="chat-sidebar">
            <a href="perfil1.html" class="chat-user"><div class="avatar"></div> Integrante 1</a>
            <a href="perfil2.html" class="chat-user"><div class="avatar"></div> Integrante 2</a>
            <a href="perfil3.html" class="chat-user"><div class="avatar"></div> Integrante 3</a>
            <a href="perfil4.html" class="chat-user"><div class="avatar"></div> Integrante 4</a>
            <div class="chat-user"><div class="avatar"></div> Persona random 5</div>
            <div class="chat-user"><div class="avatar"></div> Persona random 6</div>
        </aside>

    </div>

    <footer class="footer">
        <p>(C) Rickie Lukens, 2023</p>
    </footer>

    <div class="floating-btn">
        <svg width="30" height="40" viewBox="0 0 100 150"><circle cx="50" cy="30" r="15" stroke="black" stroke-width="4" fill="none"/><line x1="50" y1="45" x2="50" y2="100" stroke="black" stroke-width="4"/><line x1="20" y1="60" x2="80" y2="60" stroke="black" stroke-width="4"/><line x1="50" y1="100" x2="25" y2="140" stroke="black" stroke-width="4"/><line x1="50" y1="100" x2="75" y2="140" stroke="black" stroke-width="4"/></svg>
    </div>

</body>
</html>
