<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaTube - Perfil</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="banner">
        <h1><a href="index.html">InstaTube</a></h1>
        <div class="auth-nav">
            <a href="editar.html">Tu Perfil (Editar)</a>
        </div>
    </header>

    <div class="container">
        <main class="main-area" id="dynamic-profile">
            <div class="profile-box">
                <div class="profile-pic img-container">
                    <img id="profile-img" src="img/Foto de perfil/Foto de david.jpg" alt="Foto de perfil">
                </div>
                
                <div class="profile-info">
                    <h2 id="profile-name">David Lopez</h2>
                    <p class="location" id="profile-location">Mexico Campeche</p>
                    
                    <h3>Acerca de mi</h3>
                    <p class="bio" id="profile-bio">Aqui vamos con todo.</p>
                </div>
            </div>
        </main>

        <aside class="chat-sidebar">
            <h3>Contactos</h3>
            <ul id="chat-list" class="chat-list">
                <li>
                    <a href="perfil_ana.html" class="chat-user">
                        <div class="avatar img-container">
                            <img src="img/Foto de perfil/foto de ana.jpg" alt="Foto de Ana">
                        </div>
                        <span>Ana Gómez</span>
                    </a>
                </li>
                <li>
                    <a href="perfil_carlos.html" class="chat-user">
                        <div class="avatar img-container">
                            <img src="img/Foto de perfil/Foto de Carlos.jpg" alt="Foto de Carlos">
                        </div>
                        <span>Carlos Ruiz</span>
                    </a>
                </li>
                <li>
                    <a href="perfil_maria.html" class="chat-user">
                        <div class="avatar img-container">
                            <img src="img/Foto de perfil/Foto de maria.jpg" alt="Foto de María">
                        </div>
                        <span>María Silva</span>
                    </a>
                </li>
                <li>
                    <a href="perfil_pedro.html" class="chat-user">
                        <div class="avatar img-container">
                            <img src="img/Foto de perfil/Foto de Pedro.jpg" alt="Foto de Pedro">
                        </div>
                        <span>Pedro León</span>
                    </a>
                </li>
                <li>
                    <a href="perfil_laura.html" class="chat-user">
                        <div class="avatar img-container">
                            <img src="img/Foto de perfil/Foto de Laura.jpg" alt="Foto de Laura">
                        </div>
                        <span>Laura Paz</span>
                    </a>
                </li>
                <li>
                    <a href="perfil_juan.html" class="chat-user">
                        <div class="avatar img-container">
                            <img src="img/Foto de perfil/Foto de Juan.jpg" alt="Foto de Juan">
                        </div>
                        <span>Juan Torres</span>
                    </a>
                </li>
            </ul>
        </aside>
    </div>
</body>
</html>
