<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Perfil de Ana Gómez - InstaTube</title>
    <link rel="stylesheet" href="styles.css">

<body>
    <header class="banner">

            <a href="editar.html">Tu Perfil (Editar)</a>
        </div>
    </header>

    <div class="container">
        <main class="main-area">
            <div class="profile-box">
                <div class="profile-pic img-container">
                    <img src="img/Foto de perfil/foto de ana.jpg" alt="Foto de Ana Gómez">

                <div class="profile-info">
                    <h2>Ana Gómez</h2>

                    <p class="bio">Desarrolladora Frontend apasionada por el diseño y el café.</p>
                </div>
            </div>
        </main>

        <aside class="chat-sidebar">
            <h3>Contactos</h3>
            <ul class="chat-list">
                <li><a href="perfil.html" class="chat-user"><div class="avatar img-container"><img src="img/Foto de perfil/Foto de david.jpg" alt="David"></div><span>David Lopez</span></a></li>
                <li><a href="perfil_carlos.html" class="chat-user"><div class="avatar img-container"><img src="img/Foto de perfil/Foto de Carlos.jpg" alt="Carlos"></div><span>Carlos Ruiz</span></a></li>
                <li><a href="perfil_maria.html" class="chat-user"><div class="avatar img-container"><img src="img/Foto de perfil/Foto de maria.jpg" alt="Maria"></div><span>María Silva</span></a></li>
                <li><a href="perfil_pedro.html" class="chat-user"><div class="avatar img-container"><img src="img/Foto de perfil/Foto de Pedro.jpg" alt="Pedro"></div><span>Pedro León</span></a></li>
                <li><a href="perfil_laura.html" class="chat-user"><div class="avatar img-container"><img src="img/Foto de perfil/Foto de Laura.jpg" alt="Laura"></div><span>Laura Paz</span></a></li>
                <li><a href="perfil_juan.html" class="chat-user"><div class="avatar img-container"><img src="img/Foto de perfil/Foto de Juan.jpg" alt="Juan"></div><span>Juan Torres</span></a></li>
            </ul>
        </aside>
    </div>

</html>
