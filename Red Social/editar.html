<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - InstaTube</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="banner">
        <h1><a href="index.html">InstaTube</a></h1>
        <div class="auth-nav">
            <a href="perfil.html?id=1">Ver mi perfil</a>
        </div>
    </header>

    <div class="container">
        <main class="main-area">
            <h2>Modificar mi Información</h2>
            
            <form id="editForm" class="edit-form">
                <label for="name">Nombre de Usuario:</label>
                <input type="text" id="name" value="David Lopez" required>

                <label for="location">Ubicación:</label>
                <input type="text" id="location" value="Mexico Campeche" required>

                <label for="bio">Acerca de mi:</label>
                <textarea id="bio" rows="4" required>Aqui vamos con todo.</textarea>

                <label for="imageUpload">Cambiar foto de perfil (Sube una imagen):</label>
                <input type="file" id="imageUpload" accept="image/*">
                <input type="hidden" id="imageBase64" value="img/Foto de perfil/Foto de david.jpg">

                <button type="submit">Guardar Cambios</button>
            </form>
        </main>
    </div>
</body>
</html>
