<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - InstaTube</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="banner">
        <h1><a href="index.html">InstaTube</a></h1>
        <div class="auth-nav">
            <a href="login.html">Iniciar Sesión</a>
        </div>
    </header>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Crea tu Cuenta</h2>
            <form id="registerForm" class="auth-form">
                <label for="reg-name">Nombre de Usuario:</label>
                <input type="text" id="reg-name" placeholder="Ej: Juan Pérez" required>

                <label for="reg-email">Correo Electrónico:</label>
                <input type="email" id="reg-email" placeholder="correo@ejemplo.com" required>

                <label for="reg-password">Contraseña:</label>
                <input type="password" id="reg-password" placeholder="Crea una contraseña" required>

                <button type="submit" class="btn-submit">Registrarme</button>
            </form>
            
            <div class="auth-footer">
                ¿Ya tienes una cuenta? <a href="login.html">Inicia sesión</a>
            </div>
        </div>
    </div>
</body>
</html>
